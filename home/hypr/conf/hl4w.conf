# =============================================
# HL4W Custom Window Rules & Env
# =============================================

# HL4W Welcome 悬浮窗口
windowrulev2 = float,class:(com.hl4w.welcome)
windowrulev2 = size 700 600,class:(com.hl4w.welcome)
windowrulev2 = center,class:(com.hl4w.welcome)

windowrulev2 = float,class:(hl4w-welcome.py)
windowrulev2 = size 400 500,class:(hl4w-welcome.py)
windowrulev2 = center,class:(hl4w-welcome.py)

# HL4W 配置设置面板
windowrulev2 = float,class:(com.hl4w.dotfilessettings)
windowrulev2 = size 700 600,class:(com.hl4w.dotfilessettings)
windowrulev2 = move 10% 20%,class:(com.hl4w.dotfilessettings)

windowrulev2 = float,class:(hl4w-dotfiles-settings.py)
windowrulev2 = size 400 500,class:(hl4w-dotfiles-settings.py)
windowrulev2 = move 10% 20%,class:(hl4w-dotfiles-settings.py)

# Hyprland 设置窗口
windowrulev2 = float,class:(com.hl4w.hyprlandsettings)
windowrulev2 = size 700 600,class:(com.hl4w.hyprlandsettings)
windowrulev2 = center,class:(com.hl4w.hyprlandsettings)

windowrulev2 = float,class:(hl4w-hyprland-settings.py)
windowrulev2 = size 700 600,class:(hl4w-hyprland-settings.py)
windowrulev2 = center,class:(hl4w-hyprland-settings.py)

# 通用浮动窗口规则
windowrulev2 = float,class:(dotfiles-floating)
windowrulev2 = size 1000 800,class:(dotfiles-floating)
windowrulev2 = center,class:(dotfiles-floating)

# 环境变量
env = APPIMAGELAUNCHER_DISABLE,1

# 禁用自启脚本（保留注释，便于后续开启）
# exec-once = $HOME/.config/hypr/scripts/hl4w-welcome-autostart.sh
# exec-once = $HOME/.config/hl4w-hyprland-settings/hyprctl.sh
# exec-once = $HOME/.config/hypr/scripts/eww.sh