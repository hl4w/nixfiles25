dwindle {
    pseudotile = true
    preserve_split = true
}

master {
    orientation = right      # 主窗口在右侧（完全替代 master_right）
    new_status = master       # 新窗口成为主窗口（官方合法参数）
    mfact = 0.55              # 主窗口宽度占比（可选）
}
